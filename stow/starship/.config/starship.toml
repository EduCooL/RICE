add_newline = false
command_timeout = 800

format = "$directory$git_branch$git_status$python$nodejs$package$docker_context$cmd_duration$line_break$character"

palette = "cozy_rain"

[palettes.cozy_rain]
base = "#0B1110"
surface = "#101716"
text = "#D7DFDA"
muted = "#AEBDB6"
dim = "#7D8D86"
sage_soft = "#42635D"
sage = "#6F9189"
success = "#8AAA7F"
amber = "#B7925F"
danger = "#C87469"

[directory]
style = "bold sage"
truncation_length = 4
truncation_symbol = "../"
read_only = " ro"
read_only_style = "amber"

[git_branch]
symbol = "git "
style = "amber"
format = "[$symbol$branch]($style) "

[git_status]
style = "danger"
format = "[$all_status$ahead_behind]($style) "
conflicted = "!"
ahead = ">"
behind = "<"
diverged = "<>"
untracked = "?"
stashed = "$"
modified = "*"
staged = "+"
renamed = "r"
deleted = "x"

[python]
symbol = "py "
style = "sage"
format = "[$symbol$pyenv_prefix$version( $virtualenv)]($style) "

[nodejs]
symbol = "node "
style = "sage"
format = "[$symbol$version]($style) "

[package]
symbol = "pkg "
style = "muted"
format = "[$symbol$version]($style) "

[docker_context]
symbol = "docker "
style = "sage"
format = "[$symbol$context]($style) "
only_with_files = true

[cmd_duration]
min_time = 1500
style = "dim"
format = "[$duration]($style) "

[line_break]
disabled = false

[character]
success_symbol = "[>](bold sage)"
error_symbol = "[>](bold danger)"
vimcmd_symbol = "[<](bold amber)"
