add_newline = false
command_timeout = 800

format = "$directory$git_branch$git_status$python$nodejs$package$docker_context$cmd_duration$line_break$character"

palette = "cozy_rain"

[palettes.cozy_rain]
base = "#0E1312"
surface = "#151A19"
text = "#D8E1DC"
muted = "#A7B9B1"
dim = "#73837D"
teal_soft = "#516F66"
teal = "#6E8D88"
sage = "#8BAE8B"
amber = "#B89A6A"
danger = "#D1786C"

[directory]
style = "bold teal"
truncation_length = 4
truncation_symbol = "../"
read_only = " ro"
read_only_style = "amber"

[git_branch]
symbol = "git "
style = "amber"
format = "[$symbol$branch]($style) "

[git_status]
style = "danger"
format = "[$all_status$ahead_behind]($style) "
conflicted = "!"
ahead = ">"
behind = "<"
diverged = "<>"
untracked = "?"
stashed = "$"
modified = "*"
staged = "+"
renamed = "r"
deleted = "x"

[python]
symbol = "py "
style = "sage"
format = "[$symbol$pyenv_prefix$version( $virtualenv)]($style) "

[nodejs]
symbol = "node "
style = "sage"
format = "[$symbol$version]($style) "

[package]
symbol = "pkg "
style = "muted"
format = "[$symbol$version]($style) "

[docker_context]
symbol = "docker "
style = "teal"
format = "[$symbol$context]($style) "
only_with_files = true

[cmd_duration]
min_time = 1500
style = "dim"
format = "[$duration]($style) "

[line_break]
disabled = false

[character]
success_symbol = "[>](bold teal)"
error_symbol = "[>](bold danger)"
vimcmd_symbol = "[<](bold amber)"
