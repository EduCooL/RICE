# Cozy dark glass: compact gaps, soft rounding, low-contrast borders.
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 1
    col.active_border = rgba(A7B9B166) rgba(6E8D8844) 45deg
    col.inactive_border = rgba(A7B9B122)
    layout = dwindle
}

decoration {
    rounding = 14
    active_opacity = 1.0
    inactive_opacity = 0.96
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 6
        passes = 2
        vibrancy = 0.12
    }

    shadow {
        enabled = true
        range = 18
        render_power = 2
        color = rgba(00000066)
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
}
