# Stage-2 card geometry for stock Hyprland windows.
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 1
    col.active_border = rgba(6F91894D) rgba(A7B9B126) 45deg
    col.inactive_border = rgba(A7B9B118)
    layout = dwindle
}

decoration {
    rounding = 14
    active_opacity = 1.0
    inactive_opacity = 0.96
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 7
        passes = 2
        vibrancy = 0.08
    }

    shadow {
        enabled = true
        range = 16
        render_power = 2
        color = rgba(000000A6)
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
}
