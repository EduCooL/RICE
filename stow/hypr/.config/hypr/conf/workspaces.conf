# Workspace model:
# 1 dev    terminal-heavy development
# 2 web    browser and research
# 3 code   editor/IDE
# 4 chat   communication
# 5 media  music/video
# 6 files  file managers and documents

workspace = 1, name:dev
workspace = 2, name:web
workspace = 3, name:code
workspace = 4, name:chat
workspace = 5, name:media
workspace = 6, name:files

# Keep the first six workspaces persistent so Waybar and future shell work can
# display the intended model even before every workspace has a window.
workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true
workspace = 5, persistent:true
workspace = 6, persistent:true
