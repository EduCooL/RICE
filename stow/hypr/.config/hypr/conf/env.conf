# Wayland/session defaults.
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Toolkit Wayland support with X11 fallbacks where useful.
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
# qt5ct/qt6ct + Kvantum keep Qt apps from falling back to a bright default.
# If a Qt app misbehaves, comment QT_STYLE_OVERRIDE first and reload Hyprland.
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_STYLE_OVERRIDE,kvantum
env = GDK_BACKEND,wayland,x11
env = CLUTTER_BACKEND,wayland
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = NIXOS_OZONE_WL,1

# Electron apps may still need app-specific flags, for example:
# code --enable-features=UseOzonePlatform --ozone-platform=wayland

# Intel + NVIDIA hybrid note:
# Keep NVIDIA-specific variables disabled by default so the laptop can use normal
# hybrid graphics behavior. Enable only if the proprietary NVIDIA driver setup
# needs it and the Arch/Hyprland wiki guidance matches the installed driver.
# env = LIBVA_DRIVER_NAME,nvidia
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = NVD_BACKEND,direct
