# Stage-1 shell services. Keep this list small to avoid duplicate daemons.
exec-once = hyprpaper
exec-once = hypridle
exec-once = swaync
exec-once = waybar
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Stage 3 Quickshell prototype. Keep disabled until it is tested next to Waybar.
# exec-once = quickshell

# Optional tray agents. Enable if installed and useful on the target laptop.
# exec-once = nm-applet --indicator
# exec-once = blueman-applet

# Polkit agent examples. Use one matching the installed package.
# exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
# exec-once = hyprpolkitagent
