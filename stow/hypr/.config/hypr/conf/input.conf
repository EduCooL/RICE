# Keyboard: us/ru with Alt+Shift layout switching.
# Change kb_layout/kb_options here if a different layout is needed.
input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle
    numlock_by_default = true
    repeat_rate = 35
    repeat_delay = 250

    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        scroll_factor = 0.35
    }
}
