# Conservative floating rules for utility windows and dialogs.
windowrule {
    name = pavucontrol-floating
    match:class = pavucontrol
    float = on
    size = 760 520
    center = on
}

windowrule {
    name = blueman-manager-floating
    match:class = blueman-manager
    float = on
    center = on
}

windowrule {
    name = nm-connection-editor-floating
    match:class = nm-connection-editor
    float = on
    center = on
}

windowrule {
    name = open-file-dialog-floating
    match:title = ^(Open File)(.*)$
    float = on
}

windowrule {
    name = save-file-dialog-floating
    match:title = ^(Save File)(.*)$
    float = on
}

windowrule {
    name = choose-file-dialog-floating
    match:title = ^(Choose File)(.*)$
    float = on
}

windowrule {
    name = file-upload-dialog-floating
    match:title = ^(File Upload)(.*)$
    float = on
}

windowrule {
    name = picture-in-picture-floating
    match:title = ^(Picture-in-Picture)$
    float = on
    pin = on
    keep_aspect_ratio = on
}

# Idle inhibit rules changed across Hyprland versions.
# Keep this handled by hypridle/app requests instead of adding fragile rules here.
