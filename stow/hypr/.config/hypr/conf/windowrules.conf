# Conservative floating rules for utility windows and dialogs.
windowrule = float true, class:^(pavucontrol)$
windowrule = size 760 520, class:^(pavucontrol)$
windowrule = center true, class:^(pavucontrol)$

windowrule = float true, class:^(blueman-manager)$
windowrule = center true, class:^(blueman-manager)$

windowrule = float true, class:^(nm-connection-editor)$
windowrule = center true, class:^(nm-connection-editor)$

windowrule = float true, title:^(Open File)(.*)$
windowrule = float true, title:^(Save File)(.*)$
windowrule = float true, title:^(Choose File)(.*)$
windowrule = float true, title:^(File Upload)(.*)$

windowrule = float true, title:^(Picture-in-Picture)$
windowrule = pin true, title:^(Picture-in-Picture)$
windowrule = keep_aspect_ratio true, title:^(Picture-in-Picture)$

# Idle inhibit rules changed across Hyprland versions.
# Keep this handled by hypridle/app requests instead of adding fragile rules here.
