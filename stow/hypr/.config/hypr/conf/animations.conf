# Calm, short animations. No bounce-heavy easing.
animations {
    enabled = true

    bezier = calm, 0.16, 1, 0.3, 1

    animation = windows, 1, 4, calm, popin 85%
    animation = windowsOut, 1, 3, calm, popin 85%
    animation = border, 1, 5, calm
    animation = fade, 1, 4, calm
    animation = workspaces, 1, 4, calm, slide
}

