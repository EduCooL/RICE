# Stage-2 lockscreen card layout.
# Uses a live screenshot so locking never depends on a committed wallpaper.

background {
    monitor =
    path = screenshot
    blur_passes = 2
    blur_size = 8
    noise = 0.010
    contrast = 0.90
    brightness = 0.48
    vibrancy = 0.06
    vibrancy_darkness = 0.45
}

# Primary time.
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(D7DFDAF2)
    font_size = 72
    font_family = Inter
    position = 0, 88
    halign = center
    valign = center
}

# Date below time.
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(AEBDB6D9)
    font_size = 17
    font_family = Inter
    position = 0, 18
    halign = center
    valign = center
}

# Small status marker.
label {
    monitor =
    text = locked
    color = rgba(B7925FCC)
    font_size = 13
    font_family = Inter
    position = 0, -58
    halign = center
    valign = center
}

# Glass password card.
input-field {
    monitor =
    size = 300, 46
    outline_thickness = 1
    outer_color = rgba(A7B9B14D)
    inner_color = rgba(101716D9)
    font_color = rgba(D7DFDAEE)
    fail_color = rgba(C8746999)
    check_color = rgba(6F918977)
    placeholder_text = <span foreground="##7D8D86">Password</span>
    fade_on_empty = false
    rounding = 14
    dots_size = 0.22
    dots_spacing = 0.24
    dots_center = true
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

# Minimal hint row. Keep it subtle and non-interactive.
label {
    monitor =
    text = Esc clears input
    color = rgba(7D8D8688)
    font_size = 11
    font_family = Inter
    position = 0, -170
    halign = center
    valign = center
}
