# Minimal lock screen matching the project palette.
background {
    monitor =
    # Use a live screenshot so lockscreen never depends on a wallpaper asset.
    path = screenshot
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.92
    brightness = 0.56
    vibrancy = 0.08
    vibrancy_darkness = 0.40
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(D7DFDAEE)
    font_size = 74
    font_family = Inter
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(AEBDB6CC)
    font_size = 18
    font_family = Inter
    position = 0, 10
    halign = center
    valign = center
}

label {
    monitor =
    text = lock
    color = rgba(B7925FCC)
    font_size = 16
    font_family = Inter
    position = 0, -68
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 44
    outline_thickness = 1
    dots_size = 0.22
    dots_spacing = 0.25
    dots_center = true
    outer_color = rgba(A7B9B14D)
    inner_color = rgba(101716C7)
    font_color = rgba(D7DFDAEE)
    fade_on_empty = false
    placeholder_text = <span foreground="##7D8D86">Password</span>
    hide_input = false
    check_color = rgba(6F918977)
    fail_color = rgba(C8746999)
    rounding = 14
    position = 0, -130
    halign = center
    valign = center
}
