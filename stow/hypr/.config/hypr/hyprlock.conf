# Minimal lock screen matching the project palette.
background {
    monitor =
    path = $HOME/Pictures/Wallpapers/current
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.95
    brightness = 0.62
    vibrancy = 0.12
    vibrancy_darkness = 0.35
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(D8E1DCEE)
    font_size = 82
    font_family = Inter
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(A7B9B1CC)
    font_size = 18
    font_family = Inter
    position = 0, 10
    halign = center
    valign = center
}

label {
    monitor =
    text = lock
    color = rgba(B89A6ACC)
    font_size = 16
    font_family = Inter
    position = 0, -68
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 44
    outline_thickness = 1
    dots_size = 0.22
    dots_spacing = 0.25
    dots_center = true
    outer_color = rgba(A7B9B144)
    inner_color = rgba(151A19CC)
    font_color = rgba(D8E1DCEE)
    fade_on_empty = false
    placeholder_text = <span foreground="##73837D">Password</span>
    hide_input = false
    check_color = rgba(6E8D8877)
    fail_color = rgba(D1786C99)
    rounding = 14
    position = 0, -130
    halign = center
    valign = center
}

