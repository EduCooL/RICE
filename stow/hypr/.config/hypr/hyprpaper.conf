# Wallpaper convention:
#   ~/Pictures/Wallpapers/current
#
# No wallpaper binary is shipped in this repo. Create this path as a file or
# symlink before starting Hyprland, or run ~/.config/hypr/scripts/wallpaper.sh
# after adding one. Hyprpaper supports tilde expansion in config paths.

wallpaper {
    monitor =
    path = ~/Pictures/Wallpapers/current
    fit_mode = cover
}

splash = false
ipc = true
